
spring:
  application:
    name: authfordge-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/authfordge}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          from: ${MAIL_SENDER:aayushkodan@gmail.com}
          auth: true
          starttls:
            enable: true
    protocol: smtp
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:978121615738-q3ef849thucgn1sqoh498mpj6vckpqbo.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope:
              - email
              - profile
              - openid

          github:
            client-id: ${GITHUB_CLIENT_ID:Ov23ligzjuUOpPbdRbaH}
            client-secret: ${GITHUB_CLIENT_SECRET:d4616c4811d32352c706491b8fb1ada5f6852b17}
            scope:
              - user:email
              - read:user

security:
  jwt:
    secret: ${JWT_SECRET:myJwtSecretKeyIsVerySecureAndLongEnoughForHS256AlgorithmWithAtLeast32Bytes512bitsMyApp2026DelhiStudentProjectVanLifeAPI}
    issuer: ${JWT_ISSUER:localhost}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  auth:
    frontend:
      success-url: ${AUTH_FRONTEND_SUCCESS_URL:http://localhost:5173}
      failure-url: ${AUTH_FRONTEND_FAILURE_URL:http://localhost:5173}